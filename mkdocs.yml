site_name: scopusflow (Python)
site_description: A reproducible workflow layer over pybliometrics for Scopus searches.
site_url: https://pablobernabeu.github.io/scopusflow-py/
repo_url: https://github.com/pablobernabeu/scopusflow-py
# repo_name is left unset so the header shows a compact "GitHub" chip.
# The licence link is absolute: the copyright line renders on every page, and a
# relative link would resolve against nested pages and break.
copyright: >
  <span class="mrd-footer-badges">
  <a href="https://github.com/pablobernabeu/scopusflow-py/actions/workflows/tests.yaml"><img src="https://github.com/pablobernabeu/scopusflow-py/actions/workflows/tests.yaml/badge.svg" alt="tests"></a>
  <a href="https://lifecycle.r-lib.org/articles/stages.html#experimental"><img src="https://img.shields.io/badge/lifecycle-experimental-orange.svg" alt="Lifecycle: experimental"></a>
  <a href="https://opensource.org/license/MIT"><img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="License: MIT"></a>
  </span>
  Developed by <a href="https://pablobernabeu.github.io">Pablo Bernabeu</a> ·
  Released under the
  <a href="https://pablobernabeu.github.io/scopusflow-py/licence/">MIT licence</a> ·
  Scopus is a trademark of Elsevier; scopusflow is an independent client.

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  # The header and footer are held at the deep-navy brand ink in both schemes
  # (primary: black is the closest preset, retuned to the exact navy in
  # stylesheets/brand.css); accent carries the warm amber.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css

plugins:
  - search
  # Runs the offline example blocks at build time and embeds their output
  # (tables and figures), so the guides show results like a knitted R vignette.
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            separate_signature: true
            members_order: source
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [".", "docs"]
      check_paths: true

nav:
  - Home: index.md
  - Get started: guides/getting-started.md
  - Reference:
      - Plan and query: reference/plan-and-query.md
      - Retrieve: reference/retrieve.md
      - Records: reference/records.md
      - DOIs and tracking: reference/dois.md
      - Analyse and plot: reference/analyse.md
  - Articles:
      - Designing queries: guides/designing-queries.md
      - Search plans and quota: guides/plans-and-quota.md
      - Building a reference set: guides/building-a-reference-set.md
      - Analysing a literature: guides/analysing-a-literature.md
      - Author keywords and references: guides/keywords-and-references.md
      - Comparing topics: guides/comparing-topics.md
      - Tracking change over time: guides/tracking-literature-change.md
      - The code-free app: guides/the-app.md
  - Changelog: changelog.md
  - About: about.md

# The released version shown beside the title in the header (updated on release).
extra:
  version: "0.3.0"
