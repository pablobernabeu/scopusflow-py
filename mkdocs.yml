site_name: scopusflow (Python)
site_description: A reproducible workflow layer over pybliometrics for Scopus searches.
site_url: https://pablobernabeu.github.io/scopusflow-py/
repo_url: https://github.com/pablobernabeu/scopusflow-py
repo_name: pablobernabeu/scopusflow-py
copyright: MIT licence. Scopus is a trademark of Elsevier; this is an independent client.

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest

plugins:
  - search
  # Runs the offline example blocks at build time and embeds their output
  # (tables and figures), so the guides show results like a knitted R vignette.
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            separate_signature: true
            members_order: source
            heading_level: 2

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Guides:
      - Getting started: guides/getting-started.md
      - Designing queries: guides/designing-queries.md
      - Search plans and quota: guides/plans-and-quota.md
      - Planning a harvest: guides/planning-a-harvest.md
      - Building a reference set: guides/building-a-reference-set.md
      - Analysing a literature: guides/analysing-a-literature.md
      - Comparing topics: guides/comparing-topics.md
      - Tracking change over time: guides/tracking-literature-change.md
      - The code-free app: guides/the-app.md
  - Reference:
      - Plan and query: reference/plan-and-query.md
      - Retrieve: reference/retrieve.md
      - Records: reference/records.md
      - DOIs and tracking: reference/dois.md
      - Analyse and plot: reference/analyse.md
