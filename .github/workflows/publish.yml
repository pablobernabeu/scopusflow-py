# Build and publish a release to PyPI through trusted publishing (OIDC), so no
# API token is ever stored in the repository.
#
# One-time setup on PyPI: in the project's Publishing settings, add this
# repository as a trusted publisher with workflow file "publish.yml" and
# environment "pypi". The project does not exist on PyPI yet, so add it as a
# pending publisher (PyPI creates the project on the first upload). This workflow
# then publishes every release, starting with 0.1.1. It runs when a GitHub
# release is published.
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the distribution
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/scopusflow/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
